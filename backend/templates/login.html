<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ Thống Giám Sát Nồng Độ Cồn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            color: #fff;
            font-size: 1.875rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            color: #d1d5db;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #475569;
        }
        
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        
        .demo-accounts {
            background: #374151;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 2rem;
            font-size: 0.875rem;
        }
        
        .demo-accounts h3 {
            color: #9ca3af;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .account-item {
            color: #d1d5db;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }
        
        .account-item strong {
            color: #3b82f6;
        }
        
        .loading {
            display: none;
        }
        
        .loading.active {
            display: inline-block;
        }
        
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">🍷</div>
            <h1>CSGT Cồn</h1>
            <p class="subtitle">Hệ Thống Giám Sát Nồng Độ Cồn Realtime</p>
        </div>
        
        <!-- Login Form -->
        <form id="login-form">
            <!-- Username -->
            <div class="form-group">
                <label for="username">Tài khoản:</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Nhập tên tài khoản"
                    required
                >
                <div class="error-message" id="username-error"></div>
            </div>
            
            <!-- Password -->
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập mật khẩu"
                    required
                >
                <div class="error-message" id="password-error"></div>
            </div>
            
            <!-- Error Message -->
            <div class="error-message" id="login-error" style="display: none; margin-bottom: 1rem;"></div>
            
            <!-- Login Button -->
            <button type="submit" class="btn-login" id="login-btn">
                <span class="loading" id="spinner">
                    <span class="spinner"></span>
                </span>
                <span id="btn-text">Đăng Nhập</span>
            </button>
        </form>
        
        <!-- Demo Accounts Info -->
        <div class="demo-accounts">
            <h3>💡 Tài Khoản Demo</h3>
            <div class="account-item">
                <strong>Officer:</strong><br>
                Username: csgt01<br>
                Password: 123
            </div>
            <div class="account-item">
                <strong>Admin:</strong><br>
                Username: admin<br>
                Password: 123
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = '/api';
        
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btn-text');
        const loginError = document.getElementById('login-error');
        
        // Xử lý submit form
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset error messages
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('login-error').textContent = '';
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Validate input
            if (!username || !password) {
                loginError.textContent = 'Vui lòng nhập tài khoản và mật khẩu';
                loginError.style.display = 'block';
                return;
            }
            
            // Show loading
            loginBtn.disabled = true;
            spinner.classList.add('active');
            btnText.textContent = 'Đang đăng nhập...';
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    // Lưu thông tin vào localStorage
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_fullname', data.fullname);
                    localStorage.setItem('user_username', username);
                    
                    // Chuyển hướng tới dashboard
                    window.location.href = '/';
                } else {
                    loginError.textContent = data.message || 'Đăng nhập thất bại';
                    loginError.style.display = 'block';
                    loginBtn.disabled = false;
                    spinner.classList.remove('active');
                    btnText.textContent = 'Đăng Nhập';
                    passwordInput.value = '';
                }
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = 'Lỗi kết nối. Vui lòng kiểm tra Backend server.';
                loginError.style.display = 'block';
                loginBtn.disabled = false;
                spinner.classList.remove('active');
                btnText.textContent = 'Đăng Nhập';
            }
        });
        
        // Xóa error message khi người dùng bắt đầu nhập
        usernameInput.addEventListener('input', () => {
            document.getElementById('login-error').style.display = 'none';
        });
        
        passwordInput.addEventListener('input', () => {
            document.getElementById('login-error').style.display = 'none';
        });
    </script>
</body>
</html>
