<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Giám Sát Nồng Độ Cồn Realtime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f3f4f6;
        }

        .container {
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 26px;
            font-weight: 700;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Khung hiển thị nồng độ cồn mặc định (An toàn) */
        .alcohol-display {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            padding: 35px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
            transition: all 0.5s ease;
        }

        /* Trạng thái khi bị vi phạm (Chuyển sang màu đỏ rực) */
        .alcohol-display.danger-alert {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%) !important;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.5) !important;
            animation: shake 0.4s ease-in-out infinite alternate;
        }

        .value-label {
            font-size: 16px;
            margin-bottom: 8px;
            opacity: 0.9;
            font-weight: 500;
        }

        .value-number {
            font-size: 72px;
            font-weight: 800;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        .unit {
            font-size: 24px;
            margin-left: 5px;
            font-weight: 500;
        }

        /* Khung hiển thị mức phạt */
        .penalty-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #334155;
            text-align: left;
            display: none; /* Ẩn đi, chỉ hiện khi vi phạm */
        }

        .penalty-title {
            color: #f87171;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .penalty-cost {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .penalty-law {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.4;
        }

        .status {
            margin-top: 25px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status.connected {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.disconnected {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status.connected .status-indicator {
            background-color: #10b981;
            box-shadow: 0 0 12px #10b981;
            animation: pulse 1s infinite;
        }

        .status.disconnected .status-indicator {
            background-color: #ef4444;
            box-shadow: 0 0 12px #ef4444;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        @keyframes shake {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        .info {
            margin-top: 25px;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #334155;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 HỆ THỐNG GIÁM SÁT NỒNG ĐỘ CỒN</h1>
        <p class="subtitle">IoT Alcohol Detection Monitor</p>

        <div id="display-box" class="alcohol-display">
            <div id="label-text" class="value-label">HỆ THỐNG AN TOÀN</div>
            <div class="value-number">
                <span id="display-number">--</span><span class="unit">mg/L</span>
            </div>
        </div>

        <div id="penalty-box" class="penalty-card">
            <div class="penalty-title">🚨 PHÂN LOẠI XỬ PHẠT GIAO THÔNG (Ô TÔ)</div>
            <div id="penalty-money" class="penalty-cost">0 VNĐ</div>
            <div id="penalty-details" class="penalty-law">Biện pháp: Không có xử phạt bổ sung.</div>
        </div>

        <div id="status-box" class="status disconnected">
            <span class="status-indicator"></span>
            <span id="status-text">Đang kết nối hệ thống...</span>
        </div>

        <div class="info">
            <span>Cổng kết nối: <b>COM2</b></span>
            <span>Baudrate: <b>9600</b></span>
            <span>Tần suất: <b>500ms</b></span>
        </div>
    </div>

    <script>
        function evaluatePenalty(value) {
            const penaltyBox = document.getElementById('penalty-box');
            const penaltyMoney = document.getElementById('penalty-money');
            const penaltyDetails = document.getElementById('penalty-details');
            const displayBox = document.getElementById('display-box');
            const labelText = document.getElementById('label-text');

            if (value <= 20) {
                // An toàn (xanh)
                if (penaltyBox) penaltyBox.style.display = 'none';
                if (displayBox) displayBox.classList.remove('danger-alert');
                if (labelText) labelText.innerText = "TRẠNG THÁI: AN TOÀN";
                return;
            }

            // Vi phạm (đỏ - Mức 1, 2, 3)
            if (displayBox) displayBox.classList.add('danger-alert');
            if (penaltyBox) penaltyBox.style.display = 'block';
            if (labelText) labelText.innerText = "CẢNH BÁO: PHÁT HIỆN VI PHẠM!";

            if (value > 20 && value <= 250) {
                // Mức 1: 21-250
                if (penaltyMoney) penaltyMoney.innerText = "Phạt từ: 6.000.000 - 8.000.000 VNĐ";
                if (penaltyDetails) penaltyDetails.innerText = "Mức 1: Tước quyền sử dụng Giấy phép lái xe từ 10 đến 12 tháng. Tạm giữ phương tiện đến 07 ngày.";
            } else if (value > 250 && value <= 400) {
                // Mức 2: 251-400
                if (penaltyMoney) penaltyMoney.innerText = "Phạt từ: 16.000.000 - 18.000.000 VNĐ";
                if (penaltyDetails) penaltyDetails.innerText = "Mức 2: Tước quyền sử dụng Giấy phép lái xe từ 16 đến 18 tháng. Tạm giữ phương tiện đến 07 ngày.";
            } else if (value > 400) {
                // Mức 3: > 400 (kịch khung - nguy hiểm)
                if (penaltyMoney) penaltyMoney.innerText = "Phạt từ: 30.000.000 - 40.000.000 VNĐ";
                if (penaltyDetails) penaltyDetails.innerText = "Mức 3 (Kịch khung): Tước quyền sử dụng Giấy phép lái xe từ 22 đến 24 tháng. Tạm giữ phương tiện đến 07 ngày.";
            }
        }

        function fetchRealtimeData() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/alcohol', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        
                        // Ép kiểu dữ liệu ngay lập tức
                        var alcoholLevel = parseFloat(data.alcohol_level);
                        console.log("[FRONTEND] Giá trị nhận được từ API: " + alcoholLevel);
                        
                        // BƯỚC 1: Cập nhật số thực tế vào #display-number trước tiên
                        var displayNumber = document.getElementById('display-number');
                        if (displayNumber) {
                            if (!isNaN(alcoholLevel)) {
                                displayNumber.textContent = alcoholLevel.toFixed(1);
                                console.log("[FRONTEND] Đã cập nhật hiển thị: " + alcoholLevel.toFixed(1));
                            } else {
                                displayNumber.textContent = "--";
                                console.log("[FRONTEND] Lỗi: Không thể ép kiểu số");
                            }
                        }
                        
                        // BƯỚC 2: Cập nhật trạng thái kết nối
                        var statusBox = document.getElementById('status-box');
                        var statusText = document.getElementById('status-text');
                        
                        if (data.connected) {
                            if (statusBox) statusBox.className = "status connected";
                            if (statusText) statusText.textContent = "✓ Hệ thống kết nối Realtime thành công";
                            console.log("[FRONTEND] Trạng thái: Đã kết nối");
                        } else {
                            if (statusBox) statusBox.className = "status disconnected";
                            if (statusText) statusText.textContent = "✗ Mất kết nối cổng COM2, đang thử lại...";
                            console.log("[FRONTEND] Trạng thái: Mất kết nối");
                        }
                        
                        // BƯỚC 3: Gọi evaluatePenalty() để phân loại mức phạt
                        if (!isNaN(alcoholLevel)) {
                            console.log("[FRONTEND] Gọi evaluatePenalty với giá trị: " + alcoholLevel);
                            evaluatePenalty(alcoholLevel);
                        } else {
                            // Nếu không có dữ liệu hợp lệ, mặc định là an toàn
                            evaluatePenalty(0);
                            console.log("[FRONTEND] Giá trị không hợp lệ, mặc định: An toàn");
                        }
                        
                    } catch (error) {
                        console.error("[FRONTEND] Lỗi parse JSON:", error);
                        document.getElementById('status-box').className = "status disconnected";
                        document.getElementById('status-text').textContent = "✗ Lỗi xử lý dữ liệu từ server";
                    }
                } else {
                    console.error("[FRONTEND] Lỗi HTTP: " + xhr.status);
                    document.getElementById('status-box').className = "status disconnected";
                    document.getElementById('status-text').textContent = "✗ Không thể kết nối tới Flask Server";
                }
            };
            
            xhr.onerror = function() {
                console.error("[FRONTEND] Lỗi kết nối mạng");
                document.getElementById('status-box').className = "status disconnected";
                document.getElementById('status-text').textContent = "✗ Không thể kết nối tới Flask Server";
            };
            
            xhr.send();
        }

        // Gọi hàm lần đầu để kiểm tra kết nối
        fetchRealtimeData();
        
        // Cập nhật dữ liệu realtime mỗi 500ms
        setInterval(fetchRealtimeData, 500);
    </script>
</body>
</html>
